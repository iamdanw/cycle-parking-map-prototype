<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cycle parking map</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    .app {
      display: flex;
      height: 100%;
      width: 100%;
    }
    .filter-sidebar {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      border-right: 1px solid #ddd;
      background: #f8f9fa;
      padding: 12px 14px;
      font-size: 13px;
      transition:
        width 0.2s ease,
        padding 0.2s ease,
        border-color 0.2s ease,
        opacity 0.15s ease;
    }
    .app.sidebar-collapsed .filter-sidebar {
      width: 0;
      min-width: 0;
      max-width: 0;
      padding: 0;
      border-right-color: transparent;
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-header {
      display: flex;
      justify-content: flex-end;
      margin: 0 0 8px;
    }
    .sidebar-close-btn {
      margin: 0;
      padding: 4px 10px;
      font-size: 12px;
      font-family: inherit;
      color: #333;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
    }
    .sidebar-close-btn:hover {
      background: #f0f0f0;
    }
    .sidebar-close-btn:focus-visible {
      outline: 2px solid #1565c0;
      outline-offset: 2px;
    }
    .sidebar-open-tab {
      display: none;
      position: fixed;
      left: 0;
      top: 35vh;
      z-index: 5;
      transform: translateY(-50%);
      align-items: center;
      justify-content: center;
      min-height: 72px;
      padding: 8px 6px 8px 4px;
      margin: 0;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      line-height: 1.2;
      letter-spacing: 0.02em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      color: #1a1a1a;
      background: rgba(248, 249, 250, 0.98);
      border: 1px solid #ccc;
      border-left: none;
      border-radius: 0 8px 8px 0;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.12);
      cursor: pointer;
    }
    .app.sidebar-collapsed .sidebar-open-tab {
      display: flex;
    }
    .sidebar-open-tab:hover {
      background: #fff;
    }
    .sidebar-open-tab:focus-visible {
      outline: 2px solid #1565c0;
      outline-offset: 2px;
    }
    .filter-sidebar-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .filter-sidebar-footer {
      flex-shrink: 0;
      margin: 14px 0 0;
      padding-top: 10px;
      border-top: 1px solid #ddd;
      font-size: 11px;
      line-height: 1.4;
      color: #555;
    }
    .filter-sidebar-footer a {
      color: #0d47a1;
    }
    .filter-sidebar fieldset {
      border: 0;
      margin: 0;
      padding: 0;
    }
    .filter-sidebar legend {
      font-weight: 600;
      padding: 0 0 8px;
      margin: 0;
    }
    .prk-filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      cursor: pointer;
    }
    .prk-filter-row input {
      flex-shrink: 0;
    }
    .prk-filter-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }
    .map-column {
      flex: 1;
      min-width: 0;
      position: relative;
      height: 100%;
    }
    #map {
      position: absolute;
      inset: 0;
    }
    .hint {
      position: absolute;
      z-index: 1;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      max-width: min(90vw, 420px);
      padding: 8px 14px;
      font-size: 13px;
      color: #1a1a1a;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
      pointer-events: none;
    }
    .maplibregl-popup-content {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
      max-width: min(92vw, 360px);
    }
    .maplibregl-popup-content h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .maplibregl-popup-content dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 10px;
    }
    .maplibregl-popup-content dt { color: #555; }
    .maplibregl-popup-content dd { margin: 0; }
    .maplibregl-popup-content .photos { margin-top: 10px; }
    .maplibregl-popup-content .photos details.popup-photo {
      margin: 0 0 8px;
    }
    .maplibregl-popup-content .photos details.popup-photo:last-child {
      margin-bottom: 0;
    }
    .maplibregl-popup-content .photos details.popup-photo summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      color: #333;
      user-select: none;
    }
    .maplibregl-popup-content .photos details.popup-photo img {
      display: block;
      max-width: 100%;
      height: auto;
      margin-top: 8px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .maplibregl-popup-content details.popup-json {
      margin-top: 12px;
      border-top: 1px solid #e8e8e8;
      padding-top: 10px;
    }
    .maplibregl-popup-content details.popup-json summary {
      cursor: pointer;
      font-weight: 600;
      color: #333;
      user-select: none;
    }
    .maplibregl-popup-content details.popup-json pre {
      margin: 8px 0 0;
      max-height: 240px;
      overflow: auto;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f6f8fa;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
    }
    .zoom-readout {
      position: absolute;
      z-index: 1;
      bottom: 12px;
      left: 12px;
      margin: 0;
      padding: 8px 12px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: #1a1a1a;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="filter-sidebar" id="filter-sidebar" aria-label="Facility type filters"></aside>
    <div class="map-column">
      <button
        type="button"
        id="sidebar-open-tab"
        class="sidebar-open-tab"
        aria-controls="filter-sidebar"
        aria-label="Show facility filters"
        aria-expanded="false"
      >
        Filters
      </button>
      <p class="hint">Zoom in past 13: circles are coloured by primary facility type (first match in TfL fields, excluding carriageway).</p>
      <p id="zoom-readout" class="zoom-readout" aria-live="polite" aria-label="Current map zoom level">Zoom: —</p>
      <div id="map" role="application" aria-label="Cycle parking map"></div>
    </div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    (function () {
      var PRK_LABELS = {
        PRK_CARR: 'On carriageway',
        PRK_COVER: 'Covered',
        PRK_SECURE: 'Secure',
        PRK_LOCKER: 'Locker',
        PRK_SHEFF: 'Sheffield stand',
        PRK_MSTAND: 'M-stand',
        PRK_PSTAND: 'P-stand',
        PRK_HOOP: 'Hoop',
        PRK_POST: 'Post',
        PRK_BUTERF: 'Butterfly',
        PRK_WHEEL: 'Wheel rack',
        PRK_HANGAR: 'Hangar',
        PRK_TIER: 'Tiered',
        PRK_OTHER: 'Other'
      };

      /** Facility keys used for circle colour (same order as PRK_LABELS, excluding PRK_CARR) */
      var PRK_CATEGORY_ORDER = Object.keys(PRK_LABELS).filter(function (k) {
        return k !== 'PRK_CARR';
      });

      var PRK_CATEGORY_COLORS = {
        PRK_COVER: '#1565c0',
        PRK_SECURE: '#2e7d32',
        PRK_LOCKER: '#f9a825',
        PRK_SHEFF: '#6a1b9a',
        PRK_MSTAND: '#ef6c00',
        PRK_PSTAND: '#00838f',
        PRK_HOOP: '#ad1457',
        PRK_POST: '#558b2f',
        PRK_BUTERF: '#00897b',
        PRK_WHEEL: '#4527a0',
        PRK_HANGAR: '#c62828',
        PRK_TIER: '#5d4037',
        PRK_OTHER: '#616161',
        NONE: '#90a4ae'
      };

      function primaryPrkCategory(props) {
        for (var i = 0; i < PRK_CATEGORY_ORDER.length; i++) {
          var k = PRK_CATEGORY_ORDER[i];
          if (props[k] === 'TRUE') return k;
        }
        return 'NONE';
      }

      function assignPrimaryPrkToGeoJSON(geojson) {
        var feats = geojson.features || [];
        for (var i = 0; i < feats.length; i++) {
          var f = feats[i];
          if (!f.properties) f.properties = {};
          f.properties.PRIMARY_PRK = primaryPrkCategory(f.properties);
        }
      }

      function circleColorMatchExpression() {
        var expr = ['match', ['get', 'PRIMARY_PRK']];
        for (var j = 0; j < PRK_CATEGORY_ORDER.length; j++) {
          var key = PRK_CATEGORY_ORDER[j];
          expr.push(key, PRK_CATEGORY_COLORS[key]);
        }
        expr.push(PRK_CATEGORY_COLORS.NONE);
        return expr;
      }

      /** Circles and capacity labels hidden until zoom is greater than this */
      var ZOOM_CIRCLE_SHOW = 13;

      /** Opacity for circle layer: 0 at zoom <= ZOOM_CIRCLE_SHOW, ramps to 1 by ZOOM_CIRCLE_SHOW + 1 */
      var circleOpacityExpr = [
        'interpolate',
        ['linear'],
        ['zoom'],
        ZOOM_CIRCLE_SHOW,
        0,
        ZOOM_CIRCLE_SHOW + 1,
        1
      ];

      /** Heatmap stays visible at all zooms; eases down slightly when zoomed in so points and labels stay readable */
      var heatmapOpacityExpr = [
        'interpolate',
        ['linear'],
        ['zoom'],
        8,
        0.88,
        11,
        0.78,
        14,
        0.58,
        17,
        0.45,
        19,
        0.4
      ];

      /** Weight ~ capacity, normalized (typical CPT is small; cap contribution) */
      var heatmapWeightExpr = [
        'min',
        [
          'max',
          ['/', ['coalesce', ['to-number', ['get', 'PRK_CPT']], 1], 8],
          0.15
        ],
        4
      ];

      /** Default view leaves PRK_HANGAR and PRK_CARR unchecked so hangar-only or carriageway-only sites stay hidden until enabled. */
      function buildPrkFilterExpression(enabledKeys) {
        var allKeys = Object.keys(PRK_LABELS);
        if (enabledKeys.length === allKeys.length) {
          var set = {};
          for (var i = 0; i < enabledKeys.length; i++) set[enabledKeys[i]] = true;
          var complete = true;
          for (var j = 0; j < allKeys.length; j++) {
            if (!set[allKeys[j]]) {
              complete = false;
              break;
            }
          }
          if (complete) return null;
        }
        if (enabledKeys.length === 0) return ['literal', false];
        var parts = ['any'];
        for (var k = 0; k < enabledKeys.length; k++) {
          parts.push(['==', ['get', enabledKeys[k]], 'TRUE']);
        }
        return parts;
      }

      function applyPrkFilters(map) {
        var aside = document.getElementById('filter-sidebar');
        if (!aside || !map.getLayer('parking-point')) return;
        var inputs = aside.querySelectorAll('input[type="checkbox"][data-prk]');
        var enabled = [];
        for (var i = 0; i < inputs.length; i++) {
          if (inputs[i].checked) enabled.push(inputs[i].getAttribute('data-prk'));
        }
        var expr = buildPrkFilterExpression(enabled);
        map.setFilter('parking-point', expr);
        map.setFilter('parking-heat', expr);
      }

      function initPrkFilterSidebar(map) {
        var aside = document.getElementById('filter-sidebar');
        if (!aside || aside.querySelector('fieldset')) return;
        var fieldset = document.createElement('fieldset');
        var legend = document.createElement('legend');
        legend.textContent = 'Facility types';
        fieldset.appendChild(legend);
        var keys = Object.keys(PRK_LABELS);
        for (var idx = 0; idx < keys.length; idx++) {
          var key = keys[idx];
          var labelEl = document.createElement('label');
          labelEl.className = 'prk-filter-row';
          var input = document.createElement('input');
          input.type = 'checkbox';
          input.setAttribute('data-prk', key);
          input.checked = key !== 'PRK_HANGAR' && key !== 'PRK_CARR';
          var dot = document.createElement('span');
          dot.className = 'prk-filter-dot';
          dot.style.background =
            PRK_CATEGORY_COLORS[key] != null ? PRK_CATEGORY_COLORS[key] : PRK_CATEGORY_COLORS.NONE;
          labelEl.appendChild(input);
          labelEl.appendChild(dot);
          labelEl.appendChild(document.createTextNode(PRK_LABELS[key]));
          fieldset.appendChild(labelEl);
        }
        var body = document.createElement('div');
        body.className = 'filter-sidebar-body';
        var header = document.createElement('div');
        header.className = 'sidebar-header';
        var closeBtn = document.createElement('button');
        closeBtn.type = 'button';
        closeBtn.id = 'sidebar-close-btn';
        closeBtn.className = 'sidebar-close-btn';
        closeBtn.setAttribute('aria-controls', 'filter-sidebar');
        closeBtn.setAttribute('aria-label', 'Hide facility filters');
        closeBtn.textContent = '\u00ab Hide';
        var appRoot = document.getElementById('app');
        var startCollapsed = appRoot && appRoot.classList.contains('sidebar-collapsed');
        closeBtn.setAttribute('aria-expanded', startCollapsed ? 'false' : 'true');
        closeBtn.addEventListener('click', function () {
          applySidebarCollapsed(true);
        });
        header.appendChild(closeBtn);
        body.appendChild(header);
        body.appendChild(fieldset);
        aside.appendChild(body);

        var footer = document.createElement('p');
        footer.className = 'filter-sidebar-footer';
        var tflLink = document.createElement('a');
        tflLink.href = 'https://cycling.data.tfl.gov.uk/#!CyclingInfrastructure%2F';
        tflLink.textContent = 'Powered by TfL Open Data';
        footer.appendChild(tflLink);
        aside.appendChild(footer);

        fieldset.addEventListener('change', function () {
          applyPrkFilters(map);
        });
        applyPrkFilters(map);
      }

      function activeFacilityLabels(props) {
        var out = [];
        for (var k in PRK_LABELS) {
          if (Object.prototype.hasOwnProperty.call(PRK_LABELS, k) && props[k] === 'TRUE') {
            out.push(PRK_LABELS[k]);
          }
        }
        return out.length ? out.join(', ') : '—';
      }

      function escapeHtml(s) {
        if (s == null) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function clonePropsForJson(props) {
        var o = {};
        for (var k in props) {
          if (!Object.prototype.hasOwnProperty.call(props, k)) continue;
          if (k === 'PRIMARY_PRK') continue;
          o[k] = props[k];
        }
        return o;
      }

      function pointFeatureGeoJson(props, coordinates) {
        return {
          type: 'Feature',
          geometry: {
            type: 'Point',
            coordinates: [coordinates[0], coordinates[1]]
          },
          properties: clonePropsForJson(props)
        };
      }

      function popupHtml(props, coordinates) {
        var id = escapeHtml(props.FEATURE_ID);
        var borough = escapeHtml(props.BOROUGH);
        var cpt = escapeHtml(props.PRK_CPT);
        var sv = escapeHtml(props.SVDATE);
        var types = escapeHtml(activeFacilityLabels(props));
        var p1 = props.PHOTO1_URL;
        var p2 = props.PHOTO2_URL;
        var photos = '';
        if (p1 || p2) {
          photos = '<div class="photos">';
          if (p1) {
            photos +=
              '<details class="popup-photo">' +
              '<summary>Photo 1</summary>' +
              '<img src="' + escapeHtml(p1) + '" alt="Cycle parking photo 1" />' +
              '</details>';
          }
          if (p2) {
            photos +=
              '<details class="popup-photo">' +
              '<summary>Photo 2</summary>' +
              '<img src="' + escapeHtml(p2) + '" alt="Cycle parking photo 2" />' +
              '</details>';
          }
          photos += '</div>';
        }
        var jsonSection = '';
        if (coordinates && coordinates.length >= 2) {
          var feat = pointFeatureGeoJson(props, coordinates);
          jsonSection =
            '<details class="popup-json">' +
            '<summary>GeoJSON for this point</summary>' +
            '<pre>' + escapeHtml(JSON.stringify(feat, null, 2)) + '</pre>' +
            '</details>';
        }
        return (
          '<h3>' + id + '</h3>' +
          '<dl>' +
          '<dt>Borough</dt><dd>' + borough + '</dd>' +
          '<dt>Capacity</dt><dd>' + cpt + '</dd>' +
          '<dt>Survey date</dt><dd>' + sv + '</dd>' +
          '<dt>Types</dt><dd>' + types + '</dd>' +
          '</dl>' +
          photos +
          jsonSection
        );
      }

      /** Preload photo URLs; wire <details> so only one photo section is open at a time */
      function setupParkingPopupPhotos(popupEl, props) {
        var p1 = props.PHOTO1_URL;
        var p2 = props.PHOTO2_URL;
        if (p1) {
          var pre1 = new Image();
          pre1.src = p1;
        }
        if (p2) {
          var pre2 = new Image();
          pre2.src = p2;
        }
        var panels = popupEl.querySelectorAll('details.popup-photo');
        if (!panels.length) return;
        var list = Array.prototype.slice.call(panels);
        list.forEach(function (panel) {
          panel.addEventListener('toggle', function () {
            if (!panel.open) return;
            list.forEach(function (other) {
              if (other !== panel) other.open = false;
            });
          });
        });
      }

      function boundsFromGeoJSON(geojson) {
        var minX = Infinity;
        var minY = Infinity;
        var maxX = -Infinity;
        var maxY = -Infinity;
        var features = geojson.features || [];
        for (var i = 0; i < features.length; i++) {
          var g = features[i].geometry;
          if (!g || g.type !== 'Point') continue;
          var c = g.coordinates;
          var x = c[0];
          var y = c[1];
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
        if (minX === Infinity) {
          return [[-0.51, 51.28], [0.33, 51.69]];
        }
        return [[minX, minY], [maxX, maxY]];
      }

      var map = new maplibregl.Map({
        container: 'map',
        attributionControl: true,
        style: {
          version: 8,
          sources: {
            osm: {
              type: 'raster',
              tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
              tileSize: 256,
              attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }
          },
          layers: [
            {
              id: 'osm',
              type: 'raster',
              source: 'osm',
              minzoom: 0,
              maxzoom: 19
            }
          ]
        },
        center: [-0.12, 51.5],
        zoom: 10
      });

      var appEl = document.getElementById('app');
      var sidebarWideMq = window.matchMedia('(min-width: 768px)');

      function applySidebarCollapsed(collapsed) {
        if (!appEl) return;
        appEl.classList.toggle('sidebar-collapsed', collapsed);
        var aside = document.getElementById('filter-sidebar');
        if (aside) {
          aside.setAttribute('aria-hidden', collapsed ? 'true' : 'false');
          if (collapsed) aside.setAttribute('inert', '');
          else aside.removeAttribute('inert');
        }
        var openTab = document.getElementById('sidebar-open-tab');
        if (openTab) {
          openTab.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        }
        var closeBtn = document.getElementById('sidebar-close-btn');
        if (closeBtn) {
          closeBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            map.resize();
          });
        });
      }

      applySidebarCollapsed(!sidebarWideMq.matches);

      var sidebarOpenTab = document.getElementById('sidebar-open-tab');
      if (sidebarOpenTab) {
        sidebarOpenTab.addEventListener('click', function () {
          applySidebarCollapsed(false);
        });
      }

      map.addControl(new maplibregl.NavigationControl(), 'top-right');

      var zoomReadoutEl = document.getElementById('zoom-readout');
      function updateZoomReadout() {
        zoomReadoutEl.textContent = 'Zoom: ' + map.getZoom().toFixed(2);
      }
      map.on('zoom', updateZoomReadout);
      map.on('zoomend', updateZoomReadout);
      updateZoomReadout();

      map.on('load', function () {
        fetch('data/cycle_parking.json')
          .then(function (r) {
            if (!r.ok) throw new Error('Failed to load data: ' + r.status);
            return r.json();
          })
          .then(function (geojson) {
            assignPrimaryPrkToGeoJSON(geojson);
            var bounds = boundsFromGeoJSON(geojson);

            map.addSource('parking', {
              type: 'geojson',
              data: geojson
            });

            map.addLayer({
              id: 'parking-heat',
              type: 'heatmap',
              source: 'parking',
              paint: {
                'heatmap-weight': heatmapWeightExpr,
                'heatmap-intensity': [
                  'interpolate',
                  ['linear'],
                  ['zoom'],
                  8,
                  0.8,
                  12,
                  1.2,
                  15,
                  1.5
                ],
                'heatmap-radius': [
                  'interpolate',
                  ['linear'],
                  ['zoom'],
                  8,
                  12,
                  12,
                  18,
                  15,
                  28
                ],
                'heatmap-color': [
                  'interpolate',
                  ['linear'],
                  ['heatmap-density'],
                  0,
                  'rgba(33, 102, 172, 0)',
                  0.2,
                  'rgb(103, 169, 207)',
                  0.4,
                  'rgb(209, 229, 240)',
                  0.6,
                  'rgb(253, 219, 199)',
                  0.8,
                  'rgb(239, 138, 98)',
                  1,
                  'rgb(178, 24, 43)'
                ],
                'heatmap-opacity': heatmapOpacityExpr
              }
            });

            map.addLayer({
              id: 'parking-point',
              type: 'circle',
              source: 'parking',
              paint: {
                'circle-radius': [
                  'interpolate',
                  ['linear'],
                  ['zoom'],
                  ZOOM_CIRCLE_SHOW,
                  5.5,
                  14,
                  7.5,
                  16,
                  9.5,
                  18,
                  11.5
                ],
                'circle-color': circleColorMatchExpression(),
                'circle-stroke-width': 1,
                'circle-stroke-color': '#ffffff',
                'circle-stroke-opacity': circleOpacityExpr,
                'circle-opacity': circleOpacityExpr
              }
            });

            initPrkFilterSidebar(map);

            map.fitBounds(bounds, { padding: 48, maxZoom: 14 });

            var CLICK_QUERY_RADIUS_PX = 20;

            function onMapParkingClick(e) {
              if (map.getZoom() <= ZOOM_CIRCLE_SHOW) return;
              var hits = map.queryRenderedFeatures(e.point, {
                layers: ['parking-point'],
                radius: CLICK_QUERY_RADIUS_PX
              });
              var f = hits[0];
              if (!f || !f.properties) return;
              var coords = f.geometry && f.geometry.type === 'Point' && f.geometry.coordinates
                ? f.geometry.coordinates
                : [e.lngLat.lng, e.lngLat.lat];
              var popup = new maplibregl.Popup({ maxWidth: '360px' })
                .setLngLat(e.lngLat)
                .setHTML(popupHtml(f.properties, coords))
                .addTo(map);
              var popupNode = popup.getElement();
              if (popupNode) setupParkingPopupPhotos(popupNode, f.properties);
            }

            map.on('click', onMapParkingClick);

            map.on('mouseenter', 'parking-point', function () {
              if (map.getZoom() > ZOOM_CIRCLE_SHOW) map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'parking-point', function () {
              map.getCanvas().style.cursor = '';
            });
            map.on('zoom', function () {
              if (map.getZoom() <= ZOOM_CIRCLE_SHOW) {
                map.getCanvas().style.cursor = '';
              }
            });
          })
          .catch(function (err) {
            console.error(err);
            var el = document.createElement('div');
            el.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;padding:24px;text-align:center;z-index:2;';
            el.innerHTML = '<p>Could not load <code>data/cycle_parking.json</code>. Serve this folder over HTTP (e.g. <code>python3 -m http.server</code>) and open the site from <code>http://localhost:…</code>.</p>';
            document.body.appendChild(el);
          });
      });
    })();
  </script>
</body>
</html>
